<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测测你和哪位男明星最般配</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #E53935; --secondary: #FFCDD2; --accent: #B71C1C; --bg: #FFF5F5; --card-bg: #FFFFFF; --text: #2D3748; --text-light: #718096; }
        body { font-family: 'Noto Sans SC', sans-serif; background: linear-gradient(135deg, #FFF5F5 0%, #FFEBEE 50%, #FFFDE7 100%); min-height: 100vh; color: var(--text); overflow-x: hidden; }
        .bg-decoration { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .bg-decoration::before { content: ''; position: absolute; top: -50%; right: -30%; width: 80%; height: 80%; background: radial-gradient(circle, rgba(229,57,53,0.1) 0%, transparent 70%); }
        .bg-decoration::after { content: ''; position: absolute; bottom: -30%; left: -20%; width: 60%; height: 60%; background: radial-gradient(circle, rgba(255,235,238,0.8) 0%, transparent 70%); }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
        .header { text-align: center; padding: 30px 0; }
        .header h1 { font-size: 1.8rem; font-weight: 700; color: var(--accent); margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        .header p { color: var(--text-light); font-size: 0.95rem; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 30px; box-shadow: 0 10px 40px rgba(181,76,76,0.15); margin-bottom: 20px; transition: transform 0.3s ease; }
        .card:hover { transform: translateY(-2px); }
        .progress-bar { background: #f0f0f0; border-radius: 10px; height: 8px; margin-bottom: 25px; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, var(--primary), var(--accent)); height: 100%; border-radius: 10px; transition: width 0.5s ease; }
        .question-text { font-size: 1.2rem; font-weight: 600; color: var(--text); margin-bottom: 25px; line-height: 1.6; }
        .options { display: grid; gap: 12px; }
        .option { background: var(--bg); border: 2px solid transparent; border-radius: 12px; padding: 15px 20px; cursor: pointer; transition: all 0.3s ease; font-size: 1rem; color: var(--text); display: flex; align-items: center; }
        .option:hover { border-color: var(--primary); background: var(--secondary); transform: translateX(5px); }
        .option.selected { border-color: var(--accent); background: var(--secondary); }
        .option .letter { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; background: var(--primary); color: white; border-radius: 50%; margin-right: 12px; font-weight: 600; font-size: 0.9rem; flex-shrink: 0; }
        .btn { display: block; width: 100%; padding: 16px 30px; background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; margin-top: 20px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(181,76,76,0.3); }
        .btn:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }
        .result-card { text-align: center; }
        .result-title { font-size: 1.3rem; color: var(--accent); margin-bottom: 15px; }
        .result-name { font-size: 2rem; font-weight: 700; color: var(--primary); margin-bottom: 10px; }
        .result-subtitle { font-size: 1.1rem; color: var(--text-light); margin-bottom: 20px; }
        .result-desc { background: var(--bg); padding: 20px; border-radius: 12px; text-align: left; line-height: 1.8; color: var(--text); margin-bottom: 20px; white-space: pre-wrap; }
        .stars { font-size: 2rem; margin: 15px 0; letter-spacing: 5px; }
        .result-quote { background: #FFF3E0; border-left: 4px solid var(--primary); padding: 15px; border-radius: 0 8px 8px 0; font-style: italic; color: var(--text); margin: 15px 0; }
        .start-screen { text-align: center; padding: 40px 20px; }
        .intro-text { color: var(--text-light); line-height: 1.8; margin: 20px 0; font-size: 1rem; }
        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 480px) { .header h1 { font-size: 1.5rem; } .question-text { font-size: 1.1rem; } .card { padding: 20px; } .result-name { font-size: 1.6rem; } }
    </style>
</head>
<body>
    <div class="bg-decoration"></div>
    <div class="container">
        <div class="header">
            <h1>测测你和哪位男明星最般配</h1>
            <p>全程无敏感词，全靠用户脑补</p>
        </div>
        <div id="startScreen" class="card start-screen fade-in">
            <p class="intro-text">10道题，测出你的真命天子是谁<br><br>懂的都懂，不懂也没关系<br>纯属娱乐，切勿当真</p>
            <button class="btn" id="startBtn">开始测试</button>
        </div>
        <div id="quizScreen" class="card hidden">
            <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width: 0%"></div></div>
            <div id="questionContainer"></div>
            <button class="btn" id="nextBtn" disabled>下一题</button>
        </div>
        <div id="resultScreen" class="card result-card hidden">
            <div id="resultContent"></div>
            <button class="btn" id="restartBtn">再测一次</button>
        </div>
    </div>
    <script>
        var questions = [
            { question: "第1题：周末约会，他提议去哪里？", options: [{ letter: "A", text: "私人影院，说'人少安静'" }, { letter: "B", text: "网吧开黑，说'带你上分'" }, { letter: "C", text: "KTV包房，说'给你唱我写的歌'" }, { letter: "D", text: "家里做饭，说'我厨艺很好'" }] },
            { question: "第2题：他手机坏了，第一反应是？", options: [{ letter: "A", text: "自己修，修不好就扔" }, { letter: "B", text: "找街边小店，越快越好" }, { letter: "C", text: "找官方售后，安全第一" }, { letter: "D", text: "发微博吐槽品牌" }] },
            { question: "第3题：他发了一条朋友圈'今晚有约'，配图是？", options: [{ letter: "A", text: "一杯红酒+昏暗灯光" }, { letter: "B", text: "游戏战绩截图" }, { letter: "C", text: "钢琴键盘一角" }, { letter: "D", text: "自拍，但只露眼睛" }] },
            { question: "第4题：吵架后他怎么道歉？", options: [{ letter: "A", text: "写小作文，声情并茂" }, { letter: "B", text: "做个PPT，逐条分析" }, { letter: "C", text: "直接转账5200" }, { letter: "D", text: "假装没发生，第二天正常说话" }] },
            { question: "第5题：他突然说'我想消失一段时间'，你觉得是？", options: [{ letter: "A", text: "要进组拍戏了" }, { letter: "B", text: "要去深造学习" }, { letter: "C", text: "可能要出事了" }, { letter: "D", text: "准备给我惊喜" }] },
            { question: "第6题：他最喜欢收藏什么？", options: [{ letter: "A", text: "限量版球鞋" }, { letter: "B", text: "各种相机" }, { letter: "C", text: "钢琴谱手稿" }, { letter: "D", text: "粉丝写的信" }] },
            { question: "第7题：半夜三点他给你发消息，内容是？", options: [{ letter: "A", text: "'睡了吗？'" }, { letter: "B", text: "一首他自己唱的歌" }, { letter: "C", text: "一张今天的自拍" }, { letter: "D", text: "游戏复活求带" }] },
            { question: "第8题：他被朋友爆料'私底下其实很……'", options: [{ letter: "A", text: "高冷，不爱说话" }, { letter: "B", text: "爱开玩笑，气氛担当" }, { letter: "C", text: "爱聊哲学，特别深沉" }, { letter: "D", text: "爱打游戏，能打一天" }] },
            { question: "第9题：你们第一次约会，他穿的是？", options: [{ letter: "A", text: "全套奢侈品，恨不得把logo穿身上" }, { letter: "B", text: "休闲卫衣，戴个口罩" }, { letter: "C", text: "西装，像要去演出" }, { letter: "D", text: "普通T恤，看不出牌子" }] },
            { question: "第10题：他发了一条微博只写'抱歉'，你觉得是为什么？", options: [{ letter: "A", text: "鸽了粉丝见面会" }, { letter: "B", text: "综艺录制出了点问题" }, { letter: "C", text: "新歌延期了" }, { letter: "D", text: "不太想说，但应该没事" }] }
        ];

        var results = {
            A: { name: "吴亦凡", subtitle: "法制咖顶流", desc: "你和他般配的地方是——你有'救世主情结'，总觉得他能为你改变。但姐妹醒醒，他现在真的在'改造'，不过是国家帮你改造的。建议你去探监的时候问问：当年选妃的标准，你符合几条？", match: "2", quote: "'当年问你有freestyle吗，现在问你有牢饭吗'" },
            B: { name: "李易峰", subtitle: "百里求佛", desc: "你的男人从《古剑奇谭》的百里屠苏，变成了大孤山古庙的百里求佛。他为了复出四处求人，欠债5000万，去泰国开演唱会还要你买3500的VIP票。和他在一起，你得准备好：钱给他还债，命陪他跪拜，最后还要听他念叨'欧凯'。", match: "1", quote: "'当年在荧幕上演革命者，现在在古庙里演求佛者'" },
            C: { name: "陈冠希", subtitle: "艳照门男主", desc: "你爱上的是他的痞帅，但他给你的可能是'全网可见'。2008年那场风波，受害的是女明星，背锅的是他，但拍照的是谁？是他。如果你和他在一起，建议提前做好心理建设：你们的私密时刻，可能不是两个人的事。", match: "3", quote: "'他的照片可能比你的自拍更像艺术照'" },
            D: { name: "陶喆", subtitle: "PPT之神", desc: "你的男人出轨都出得这么有仪式感——自带PPT道歉，图文并茂，逻辑清晰，甚至还有批注。如果你和他在一起，建议每次吵架都让他做PPT汇报，顺便学学他的时间管理：毕竟能同时'一次出轨'和'二次出轨'的人，不是谁都能做到的。", match: "3", quote: "'别人道歉是念稿，他道歉是路演'" },
            E: { name: "李云迪", subtitle: "钢琴王子", desc: "你的男人曾经用这双手弹奏肖邦，现在用这双手弹的是法律的弦。朝阳群众的举报让他从舞台中央跌落，但他还在海外巡演试图东山再起。和他在一起，你要准备好：听他弹琴的时候，顺便听听有没有警笛声。", match: "2", quote: "'弹钢琴的手，最后弹的是法律的弦'" },
            F: { name: "张凌赫", subtitle: "高冷学霸人设", desc: "你们般配的地方是——你足够包容他的情商盆地。别人骂他'地域黑'的时候，你只会说'他只是嘴笨'。但姐妹提醒你：恋爱可以，上综艺别让他开口。", match: "2", quote: "'情商盆地能养鱼，地域黑起来不含糊'" },
            G: { name: "鹿晗", subtitle: "顶流跌落", desc: "你和他般配，是因为你也有'流量思维'——红的时候全世界爱你，塌的时候你还在。你不在乎他有没有代言、有没有作品，你在乎的是：当年官宣关晓彤的时候，他至少没藏着。这种'公开的勇气'，就是你想要的。", match: "2", quote: "'从顶流到过气，只需一个官宣'" },
            H: { name: "田栩宁", subtitle: "哑巴新郎", desc: "你爱上的是他的安静，他翻车也是因为太安静。当全网等着他解释的时候，他选择了沉默。而你觉得：沉默就是最好的回应。姐妹，你这是'哑巴滤镜'十级患者。", match: "2", quote: "'沉默是今晚的康桥，反正他不会说话'" },
            I: { name: "赖冠霖", subtitle: "为爱退圈", desc: "你和他般配，是因为你也想被'偏爱到放弃一切'。他为了谈恋爱退圈，你觉得这是浪漫；他说'太红了没法谈'，你觉得这是真诚。建议你们一起去没人认识的地方，好好过日子。", match: "3", quote: "'为爱退圈第一人，谈完还能复出勤'" },
            J: { name: "陈冠希(2025版)", subtitle: "双标捐款侠", desc: "恭喜你，抽到了'升级版'陈冠希。他依然帅气，依然爱女儿，依然脾气火爆——火爆到会人肉骂他的网友，顺便人肉人家老婆。如果你和他在一起，建议先查查自己银行卡余额，因为下次他女儿学校被烧，可能轮到你捐款了。", match: "2", quote: "'他爱女儿的方式：让网友众筹修学校'" }
        };

        var scoreMap = { 0: 'A', 1: 'B', 2: 'C', 3: 'D', 4: 'E', 5: 'A', 6: 'B', 7: 'C', 8: 'D', 9: 'E' };
        var currentQuestion = 0;
        var answers = [];

        document.getElementById('startBtn').onclick = function() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('quizScreen').classList.remove('hidden');
            document.getElementById('quizScreen').classList.add('fade-in');
            showQuestion();
        };

        document.getElementById('restartBtn').onclick = function() {
            currentQuestion = 0;
            answers = [];
            document.getElementById('resultScreen').classList.add('hidden');
            document.getElementById('startScreen').classList.remove('hidden');
            document.getElementById('startScreen').classList.add('fade-in');
            document.getElementById('nextBtn').disabled = true;
            document.getElementById('progressFill').style.width = '0%';
        };

        document.getElementById('nextBtn').onclick = function() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                showQuestion();
                document.getElementById('nextBtn').disabled = true;
            } else {
                showResult();
            }
        };

        function showQuestion() {
            var q = questions[currentQuestion];
            var container = document.getElementById('questionContainer');
            var html = '<div class="question-text">' + q.question + '</div><div class="options">';
            for (var i = 0; i < q.options.length; i++) {
                var opt = q.options[i];
                html += '<div class="option" onclick="selectOption(' + i + ')"><span class="letter">' + opt.letter + '</span>' + opt.text + '</div>';
            }
            html += '</div>';
            container.innerHTML = html;
            updateProgress();
        }

        function selectOption(index) {
            var options = document.querySelectorAll('.option');
            for (var i = 0; i < options.length; i++) {
                options[i].classList.remove('selected');
            }
            options[index].classList.add('selected');
            answers[currentQuestion] = index;
            document.getElementById('nextBtn').disabled = false;
        }

        function updateProgress() {
            var progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function showResult() {
            var scores = {};
            for (var i = 0; i < answers.length; i++) {
                var key = scoreMap[i];
                scores[key] = (scores[key] || 0) + 1;
            }
            var maxScore = 0;
            var resultKey = 'A';
            for (var key in scores) {
                if (scores[key] > maxScore) {
                    maxScore = scores[key];
                    resultKey = key;
                }
            }
            var result = results[resultKey];
            var stars = '';
            for (var i = 0; i < parseInt(result.match); i++) { stars += '★'; }
            for (var i = parseInt(result.match); i < 5; i++) { stars += '☆'; }
            document.getElementById('quizScreen').classList.add('hidden');
            document.getElementById('resultScreen').classList.remove('hidden');
            document.getElementById('resultScreen').classList.add('fade-in');
            document.getElementById('resultContent').innerHTML = '<div class="result-title">你的真命天子是</div><div class="result-name">' + result.name + '</div><div class="result-subtitle">' + result.subtitle + '</div><div class="stars">' + stars + '</div><div class="result-desc">' + result.desc + '</div><div class="result-quote">' + result.quote + '</div>';
        }
    </script>
</body>
</html>
